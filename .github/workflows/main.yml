name: Build BlackBox APK

on:
  workflow_dispatch:  # Cho phép bấm nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Tải code về và tải luôn cả các submodule con (Bcore, android-mirror...)
    # LƯU Ý: Repo này có .gitmodules nên bắt buộc phải có submodules: recursive
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    # 2. Cài đặt Java 11 (Tương thích tốt nhất với code cũ 3 năm trước)
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # 3. Cấp quyền chạy cho file gradlew
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Tiến hành Build
    # Thêm tham số -x lint để bỏ qua các lỗi kiểm tra cú pháp không quan trọng
    # --stacktrace để hiện rõ lỗi nếu build thất bại
    - name: Build Debug APK
      run: ./gradlew assembleDebug -x lint --stacktrace

    # 5. Upload file APK sau khi build xong
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: BlackBox-Debug
        path: app/build/outputs/apk/debug/*.apk
